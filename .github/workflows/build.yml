name: Build Debug APK

on:
  push:
    branches: [master, develop]
  pull_request:
    branches: [master, develop]

jobs:
  debug-build:
    runs-on: ubuntu-latest
    env:
      JAVA_HOME: /usr/lib/jvm/java-21-openjdk-amd64

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: "recursive"

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          ndk-version: ${{ env.ANDROID_NDK_VERSION }}

      - name: Cache Gradle dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-debug-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties', '**/libs.versions.toml') }}
          restore-keys: |
            ${{ runner.os }}-gradle-debug-
            ${{ runner.os }}-gradle-

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Run Tests
        run: ./gradlew testDebugUnitTest --stacktrace

      - name: Build Debug APK
        run: ./gradlew assembleDebug --stacktrace

      - name: List Debug APK files
        run: |
          echo "Debug APK files generated:"
          find app/build/outputs/apk/debug -name "*.apk" -type f || echo "No APK files found"

      - name: Zip Debug APK
        run: |
          cp app/build/outputs/apk/debug/app-debug.apk app-debug.bin
          zip origin-debug-apk-${{ github.run_number }}.zip app-debug.bin

      - name: Send Debug APK to Gmail
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          to: ryansk0987@gmail.com
          from: "GitHub CI <${{ secrets.MAIL_USERNAME }}>"
          subject: "origin-debug-apk-${{ github.run_number }}.zip"
          convert_markdown: true
          body: |
            ## 📦 Build #${{ github.run_number }} Ready

            | Field   | Value |
            |---------|-------|
            | Repo    | `${{ github.repository }}` |
            | Branch  | `${{ github.ref_name }}` |
            | Commit  | `${{ github.sha }}` |
            | By      | `${{ github.actor }}` |

            ⚠️ Rename `app-debug.bin` → `app-debug.apk` after extracting.
          attachments: origin-debug-apk-${{ github.run_number }}.zip

      - name: Upload Test Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: debug-test-results-${{ github.run_number }}
          path: |
            app/build/reports/tests/
            app/build/test-results/
          retention-days: 7
          if-no-files-found: ignore